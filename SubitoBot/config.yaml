# ─────────────────────────────────────────────────────────────
# Configurazione bot — modifica questi valori a tuo piacimento
# ─────────────────────────────────────────────────────────────

# Timing tra messaggi (secondi) — simula comportamento umano
delay_min: 25          # minimo secondi tra un messaggio e l'altro
delay_max: 55          # massimo secondi

# Pausa lunga ogni N messaggi (simula "leggere altri annunci")
pause_every_min: 4     # pausa dopo minimo N messaggi
pause_every_max: 7     # pausa dopo massimo N messaggi
pause_duration_min: 60   # pausa minima in secondi (1 min)
pause_duration_max: 180  # pausa massima in secondi (3 min)

# Cooldown dopo errore
error_cooldown_min: 60   # attesa minima dopo errore (1 min)
error_cooldown_max: 120  # attesa massima dopo errore (2 min)

# Limiti di sicurezza
max_per_session: 0     # 0 = nessun limite per sessione
max_per_hour: 60       # massimo messaggi per ora
max_per_day: 500       # massimo messaggi per giorno (per piattaforma)
max_consecutive_errors: 3  # stop dopo N errori consecutivi

# Browser
headless: false
slow_mo: 50            # rallenta ogni azione browser (ms)
typing_delay_min: 50   # velocita' battitura minima (ms per carattere)
typing_delay_max: 130  # velocita' battitura massima (ms per carattere)

# Profilo Chrome persistente (Option A — bypass anti-bot detection)
# Lascia vuoto per usare ./chrome_profile/ relativo a questa cartella.
user_data_dir: ""

# Attach a Chrome gia' aperto (Option B — usa IL TUO browser, non uno nuovo)
# Apri Chrome con: python start_chrome.py  (oppure doppio click su start_chrome.bat)
# Fai login su subito.it nella finestra che si apre, poi lancia il bot.
# Il bot si attacca a quella finestra invece di aprirne una nuova.
# Lascia vuoto per disabilitare (e usare user_data_dir sopra).
cdp_url: "http://127.0.0.1:9222"

# Viewport random (simula schermi diversi)
viewport_widths: [1280, 1366, 1440, 1536, 1600, 1920]
viewport_heights: [800, 900, 960, 1024, 1080]
